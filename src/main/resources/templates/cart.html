<!-- CART PAGE -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <title>Cart</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
      /* Hide arrows for Chrome, Safari, Edge, Opera */
      .no-spinners::-webkit-outer-spin-button,
      .no-spinners::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* Hide arrows for Firefox */
      .no-spinners {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body>
    <!-- nav bar pasted from brooke's work-->
    <div id="toast-container" class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index:9999;display:flex;flex-direction:column;align-items:center;gap:0.5rem;"></div>
     
    <nav class="navbar navbar-expand-lg sticky-top navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="/products">
          <img th:src="@{/img/F2F-logo.svg}" width="64" height="64" alt="F2F">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarMain">

          <ul class="navbar-nav me-3">
            <li class="nav-item">
              <a class="nav-link active text-dark" href="/">Products</a>
            </li>
          </ul>

          <div class="d-flex gap-2">
            <a href="/cartdebug" class="btn btn-outline-primary">Cart</a>
            <a href="#" class="btn btn-primary">Account</a>
          </div>

        </div>
      </div>
    </nav>

    <div class="container d-flex mt-5">
      <!-- shopping cart details -->
      <div class="col-8 mx-3">
        <div class="card w-200 mb-0 p-4">
          <h4>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-basket2-fill"
              viewBox="0 2 16 16"
            >
              <path
                d="M5.929 1.757a.5.5 0 1 0-.858-.514L2.217 6H.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h.623l1.844 6.456A.75.75 0 0 0 3.69 15h8.622a.75.75 0 0 0 .722-.544L14.877 8h.623a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1.717L10.93 1.243a.5.5 0 1 0-.858.514L12.617 6H3.383zM4 10a1 1 0 0 1 2 0v2a1 1 0 1 1-2 0zm3 0a1 1 0 0 1 2 0v2a1 1 0 1 1-2 0zm4-1a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1"
              />
            </svg>
            Shopping Cart
          </h4>
          <div th:if="${#lists.isEmpty(items)}" class="col-12">
          <p class="text-muted">No products added to the cart. go to the <a href="/products">Products</a> page to add some products to your cart.</p>
        </div>

        <div th:if="${!#lists.isEmpty(items)}" class="col-12">
          <hr class="text-secondary" />
          
          <div class="row">
            <!-- <div class="col mx-5"></div> -->
            <div class="col mx-5 text-center">Item</div>
            <div class="col mx-5 text-center">Price</div>
            <div class="col mx-5 text-center">Quantity</div>
          </div>
          <div th:each="item : ${items}" class="row">
            <hr class="text-secondary" />
            <!-- Access inventory item properties -->
            <div class="col mx-5">
              <span th:text="${item.inventoryItem.name}">Product Name</span>
              <p class="text-secondary" th:text="${item.inventoryItem.categoryName}">Category</p>
            </div>
            <div class="col mx-5 text-center" th:text="'$' + ${#numbers.formatDecimal(item.inventoryItem.price * item.cartItem.quantity, 1, 2)}">
              $0.00
            </div>
            <div class="col mx-5 text-center">
              <form th:action="@{/addToCart}" method="post" class="d-flex align-items-center justify-content-center gap-2">
                <input type="hidden" name="itemId" th:value="${item.inventoryItem.sourceItemId}" />
                
                <div class="input-group" style="width: 8rem;">
                  <input type="button" value="-" class="btn btn-primary" data-field="quantity">
                  <input readonly type="number" 
                    th:value="${item.cartItem.quantity}" 
                    min="1" 
                    th:max="${item.inventoryItem.quantity}" 
                    name="quantity" 
                    class="form-control text-center border-primary no-spinners"
                    th:attr="data-initial=${item.cartItem.quantity}" />
                  <input type="button" value="+" class="btn btn-primary" data-field="quantity">
                </div>
                
                <a th:href="@{/removeFromCart(itemId=${item.inventoryItem.sourceItemId},quantity=${item.cartItem.quantity})}" class="btn btn-sm btn-danger p-2"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                  </svg>
                </a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- subtotal/price details -->
    <div class="col-4 mb-5">
      <div class="card w-150 mb-0 p-4">
        <h4>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            fill="currentColor"
            class="bi bi-cash-coin"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M11 15a4 4 0 1 0 0-8 4 4 0 0 0 0 8m5-4a5 5 0 1 1-10 0 5 5 0 0 1 10 0"
            />
            <path
              d="M9.438 11.944c.047.596.518 1.06 1.363 1.116v.44h.375v-.443c.875-.061 1.386-.529 1.386-1.207 0-.618-.39-.936-1.09-1.1l-.296-.07v-1.2c.376.043.614.248.671.532h.658c-.047-.575-.54-1.024-1.329-1.073V8.5h-.375v.45c-.747.073-1.255.522-1.255 1.158 0 .562.378.92 1.007 1.066l.248.061v1.272c-.384-.058-.639-.27-.696-.563h-.668zm1.36-1.354c-.369-.085-.569-.26-.569-.522 0-.294.216-.514.572-.578v1.1zm.432.746c.449.104.655.272.655.569 0 .339-.257.571-.709.614v-1.195z"
            />
            <path
              d="M1 0a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h4.083q.088-.517.258-1H3a2 2 0 0 0-2-2V3a2 2 0 0 0 2-2h10a2 2 0 0 0 2 2v3.528c.38.34.717.728 1 1.154V1a1 1 0 0 0-1-1z"
            />
            <path
              d="M9.998 5.083 10 5a2 2 0 1 0-3.132 1.65 6 6 0 0 1 3.13-1.567"
            />
          </svg>
          Cart Total
        </h4>
        <hr class="text-secondary" />
        <!-- subtotal -->
        <div class="row d-flex">
          <div class="col me-auto">Subtotal</div>
          <div class="col text-end" id="subtotal-value">$0.00 CAD</div>
        </div>
        <hr class="text-secondary" />
        <!-- shipping -->
        <div class="row d-flex">
          <div class="col me-auto">Shipping</div>
          <div class="col-auto text-end ms-auto">
            <div class="form-check form-check-reverse">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="freeShippingRadio"
              />
              <label class="form-check-label" for="freeShippingRadio">
                Free (15-30 days)
              </label>
            </div>
            <div class="form-check form-check-reverse">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="expressShippingRadio"
              />
              <label class="form-check-label" for="expressShippingRadio">
                Express (5-10 days)
              </label>
            </div>
            <div class="form-check form-check-reverse">
              <input
                class="form-check-input"
                type="checkbox"
                value=""
                id="premiumShippingRadio"
              />
              <label class="form-check-label" for="premiumShippingRadio">
                Premium (1-3 days)
              </label>
            </div>
          </div>
        </div>
        <hr class="text-secondary">
        <!-- Fees + Taxes -->
        <div class="row">
          <div class="col text-start">Fees + Taxes</div>
          <div class="col text-end">$8.80 CAD</div>
        </div>
        <hr class="text-secondary">
        <!-- Total -->
        <div class="row">
          <div class="col text-start">Total</div>
          <div class="col text-end" id="total-value">$0.00 CAD</div>
        </div>
      <!-- Checkout Button -->
          <button class="btn btn-secondary w-100 mt-3 text-start fw-bold p-3 text-light">
              Checkout
          </button>
      </div>
    </div>
    <script th:src="@{/scss/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
    <script>
      function updatePriceCell(input) {
        const form = input.closest('form');
        if (!form) return;
        
        const qty = parseInt(input.value) || 0;
        const row = input.closest('.row');
        if (!row) return;
        
        const cols = row.querySelectorAll('.col');
        if (cols.length < 2) return;
        
        const priceCell = cols[1];
        const priceText = priceCell.textContent.trim()
          .replace('$', '')
          .replace(' CAD', '');
        
        // This is the current line total; divide by old qty to get unit price
        const oldQty = parseInt(input.dataset.initial) || 1;
        const unitPrice = parseFloat(priceText) / oldQty || 0;
        
        // Calculate new line total
        const newLineTotal = unitPrice * qty;
        
        // Update the cell
        priceCell.textContent = '$' + newLineTotal.toFixed(2);
      }
      function updateTotals() {
        let subtotal = 0;
        
        // For each cart item, get unit price and qty, then multiply
        document.querySelectorAll('input[name="quantity"]').forEach(input => {
          const form = input.closest('form');
          if (!form) return;
          
          const qty = parseInt(input.value) || 0;
          
          // Walk up to the .row and find the price cell
          const row = input.closest('.row');
          if (!row) return;
          
          // The price cell is the 2nd .col inside this row
          // It contains "$XX.XX" text
          const cols = row.querySelectorAll('.col');
          if (cols.length < 2) return;
          
          const priceCell = cols[1];
          const priceText = priceCell.textContent.trim()
            .replace('$', '')
            .replace(' CAD', '');
          const totalPrice = parseFloat(priceText) || 0;
          
          // totalPrice is already (unit_price × qty), so just add it
          subtotal += totalPrice;
        });
        
        const taxesAndFees = 8.80;
        const total = subtotal + taxesAndFees;
        
        document.getElementById('subtotal-value').textContent = 
          '$' + subtotal.toFixed(2) + ' CAD';
        document.getElementById('total-value').textContent = 
          '$' + total.toFixed(2) + ' CAD';
      }
      // Call on page load and after any quantity change
      updateTotals();
      document.querySelectorAll('input[name="quantity"]').forEach(input => {
        input.addEventListener('change', updateTotals);
      });
      document.querySelectorAll('input[type="button"][value="+"], input[type="button"][value="-"]').forEach(btn => {
        btn.addEventListener('click', () => setTimeout(updateTotals, 50));
      });
      document.querySelectorAll('a.btn-danger').forEach(btn => {
        btn.addEventListener('click', () => setTimeout(updateTotals, 100));
      });
      function showToast(message) {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast align-items-center text-white bg-success border-0 mb-2';
        toast.setAttribute('role', 'alert');
        toast.setAttribute('aria-live', 'polite');
        toast.setAttribute('aria-atomic', 'true');
        toast.innerHTML = `
          <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        `;
        container.prepend(toast);

        if (window.bootstrap && typeof bootstrap.Toast === 'function') {
          const bsToast = new bootstrap.Toast(toast, { delay: 2400, autohide: true });
          bsToast.show();
          toast.addEventListener('hidden.bs.toast', () => toast.remove());
        } else {
          toast.style.opacity = '1';
          setTimeout(() => {
            toast.style.transition = 'opacity 0.3s';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
          }, 2400);
        }
      }

      // Removes the entire row from the DOM for a given itemId
      function removeRowFromDOM(itemId) {
        document.querySelectorAll('.input-group').forEach(group => {
          const form = group.closest('form');
          if (!form) return;
          const id = (form.querySelector('input[name="itemId"]') || {}).value;
          if (String(id) === String(itemId)) {
            // Walk up to the wrapping .row that contains the <hr> + columns
            const row = form.closest('.row');
            if (row) {
              // Also remove the <hr> that precedes this row
              const prev = row.previousElementSibling;
              if (prev && prev.tagName === 'HR') prev.remove();
              row.remove();
            }
          }
        });
      }

      // Sync the disabled state of both buttons for a given input
      function syncButtons(input) {
        const group = input.closest('.input-group');
        if (!group) return;
        const btnMinus = group.querySelector('input[value="-"]');
        const btnPlus  = group.querySelector('input[value="+"]');
        const val = parseInt(input.value);
        const min = parseInt(input.getAttribute('min') || '1');
        const max = parseInt(input.getAttribute('max') || '9999');
        if (btnMinus) btnMinus.disabled = (val <= min);
        if (btnPlus)  btnPlus.disabled  = (val >= max);
      }

      // initialise button states on page load 
      document.querySelectorAll('input[name="quantity"]').forEach(input => {
        syncButtons(input);
      });

      // +/- buttons 
      document.querySelectorAll('.input-group').forEach(group => {
        const btnMinus = group.querySelector('input[value="-"]');
        const btnPlus  = group.querySelector('input[value="+"]');
        const input    = group.querySelector('input[name="quantity"]');
        const form     = group.closest('form');
        if (!input || !form) return;

        const itemIdInput = form.querySelector('input[name="itemId"]');
        const itemId = (itemIdInput || {}).value;

        // remove button (anchored outside the input-group but inside the form)
        const trashBtn = form.querySelector('a.btn-danger');
        if (trashBtn) {
          trashBtn.addEventListener('click', async e => {
            e.preventDefault();
            try {
              const currentQty = parseInt(input.value);
              const body = new URLSearchParams({ itemId, quantity: currentQty });
              const res = await fetch('/removeFromCart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body,
              });
              if (!res.ok) throw new Error(await res.text());
              removeRowFromDOM(itemId);
              updateTotals();
              showToast('Item removed from cart');
            } catch (err) {
              showToast('Error: ' + err.message);
            }
          });
        }

        // plus
        if (btnPlus) {
          btnPlus.addEventListener('click', async () => {
            const max = parseInt(input.getAttribute('max') || '9999');
            const cur = parseInt(input.value);
            if (cur >= max) return;

            try {
              const body = new URLSearchParams({ itemId, quantity: 1 });
              const res = await fetch('/addToCart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body,
              });
              if (!res.ok) throw new Error(await res.text());
              input.value = cur + 1;
              updatePriceCell(input);
              input.dataset.initial = cur + 1;
              syncButtons(input);
              updateTotals();
              showToast('Quantity updated');
            } catch (err) {
              showToast('Error: ' + err.message);
            }
          });
        }

        // minus
        if (btnMinus) {
          btnMinus.addEventListener('click', async () => {
            const min = parseInt(input.getAttribute('min') || '1');
            const cur = parseInt(input.value);
            if (cur <= min) return;

            try {
              const body = new URLSearchParams({ itemId, quantity: 1 });
              const res = await fetch('/removeFromCart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body,
              });
              if (!res.ok) throw new Error(await res.text());
              input.value = cur - 1;
              updatePriceCell(input);
              input.dataset.initial = cur - 1;
              syncButtons(input);
              updateTotals();
              showToast('Quantity updated');
            } catch (err) {
              showToast('Error: ' + err.message);
            }
          });
        }
      });
    </script>
  </body>
</html>
