<!-- cart page -->
<html lang="en">
  <html xmlns:th="http://www.thymeleaf.org"></html>
  <head>
    <meta charset="utf-8" />
    <title>Product List</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}" />
  </head>
  <body>
    <!-- nav bar pasted from brooke's work-->
    <nav
      class="navbar navbar-expand-lg sticky-top navbar-light bg-white border-bottom"
    >
      <div class="container">
        <a class="navbar-brand" href="#">
          <img th:src="@{/img/F2F-logo.svg}" width="64" height="64" alt="F2F" />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarMain"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarMain"
        >
          <ul class="navbar-nav me-3">
            <li class="nav-item">
              <a class="nav-link active text-dark" href="#">Products</a>
            </li>
          </ul>

          <div class="d-flex gap-2">
            <a href="#" class="btn btn-outline-primary">Cart</a>
            <a href="#" class="btn btn-primary">Account</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="container d-flex mt-5">
      <!-- shopping cart details -->
      <div class="col-8 mx-3">
        <div class="card w-200 mb-0 p-4">
          <h4>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-basket2-fill"
              viewBox="0 2 16 16"
            >
              <path
                d="M5.929 1.757a.5.5 0 1 0-.858-.514L2.217 6H.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h.623l1.844 6.456A.75.75 0 0 0 3.69 15h8.622a.75.75 0 0 0 .722-.544L14.877 8h.623a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1.717L10.93 1.243a.5.5 0 1 0-.858.514L12.617 6H3.383zM4 10a1 1 0 0 1 2 0v2a1 1 0 1 1-2 0zm3 0a1 1 0 0 1 2 0v2a1 1 0 1 1-2 0zm4-1a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1"
              />
            </svg>
            Shopping Cart
          </h4>
          <hr class="text-secondary" />
          <div class="row">
            <div class="col mx-5"></div>
            <div class="col mx-5 text-center">Item</div>
            <div class="col mx-5 text-center">Price</div>
            <div class="col mx-5 text-center">Quantity</div>
          </div>
          <!-- PLACEHOLDER ITEM -->
          <hr class="text-secondary" />
          <div class="row align-items-center">
            <div class="col mx-5 d-flex">
              <img
                src="..."
                class="img-thumbnail"
                alt="product placeholder image"
              />
            </div>
            <div class="col mx-5">
              Milk
              <p class="text-secondary">John's Dairy</p>
            </div>
            <div class="col mx-5 text-center">$20.00</div>
            <div class="col mx-5 text-center">
              - 1 +
              <a href="#" class="text-secondary"> Remove </a>
            </div>
          </div>
          <!-- END OF PLACEHOLDER ITEM-->
          <!-- PLACEHOLDER ITEM -->
          <hr class="text-secondary" />
          <div class="row align-items-center">
            <div class="col mx-5 d-flex">
              <img
                src="..."
                class="img-thumbnail"
                alt="product placeholder image"
              />
            </div>
            <div class="col mx-5">
              Apples
              <p class="text-secondary">Sam's Orchard</p>
            </div>
            <div class="col mx-5 text-center">$20.00</div>
            <div class="col mx-5 text-center">
              - 1 +
              <a href="#" class="text-secondary"> Remove </a>
            </div>
          </div>
          <!-- END OF PLACEHOLDER ITEM-->
          <!-- PLACEHOLDER ITEM -->
          <hr class="text-secondary" />
          <div class="row align-items-center">
            <div class="col mx-5 d-flex">
              <img
                src="..."
                class="img-thumbnail"
                alt="product placeholder image"
              />
            </div>
            <div class="col mx-5">
              V-Bucks
              <p class="text-secondary">Fortnite Farm</p>
            </div>
            <div class="col mx-5 text-center">$20.00</div>
            <div class="col mx-5 text-center">
              - 1 +
              <a href="#" class="text-secondary"> Remove </a>
            </div>
          </div>
          <!-- END OF PLACEHOLDER ITEM-->
        </div>
      </div>
      <!-- subtotal/price details -->
      <div class="col-4 mb-5">
        <div class="card w-150 mb-0 p-4">
          <h4>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-cash-coin"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M11 15a4 4 0 1 0 0-8 4 4 0 0 0 0 8m5-4a5 5 0 1 1-10 0 5 5 0 0 1 10 0"
              />
              <path
                d="M9.438 11.944c.047.596.518 1.06 1.363 1.116v.44h.375v-.443c.875-.061 1.386-.529 1.386-1.207 0-.618-.39-.936-1.09-1.1l-.296-.07v-1.2c.376.043.614.248.671.532h.658c-.047-.575-.54-1.024-1.329-1.073V8.5h-.375v.45c-.747.073-1.255.522-1.255 1.158 0 .562.378.92 1.007 1.066l.248.061v1.272c-.384-.058-.639-.27-.696-.563h-.668zm1.36-1.354c-.369-.085-.569-.26-.569-.522 0-.294.216-.514.572-.578v1.1zm.432.746c.449.104.655.272.655.569 0 .339-.257.571-.709.614v-1.195z"
              />
              <path
                d="M1 0a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h4.083q.088-.517.258-1H3a2 2 0 0 0-2-2V3a2 2 0 0 0 2-2h10a2 2 0 0 0 2 2v3.528c.38.34.717.728 1 1.154V1a1 1 0 0 0-1-1z"
              />
              <path
                d="M9.998 5.083 10 5a2 2 0 1 0-3.132 1.65 6 6 0 0 1 3.13-1.567"
              />
            </svg>
            Cart Total
          </h4>
          <hr class="text-secondary" />
          <!-- subtotal -->
          <div class="row d-flex">
            <div class="col me-auto">Subtotal</div>
            <div class="col text-end">$67.67 CAD</div>
          </div>
          <hr class="text-secondary" />
          <!-- shipping -->
          <div class="row d-flex">
            <div class="col me-auto">Shipping</div>
            <div class="col-auto text-end ms-auto">
              <div class="form-check form-check-reverse">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="freeShippingRadio"
                />
                <label class="form-check-label" for="freeShippingRadio">
                  Free (15-30 days)
                </label>
              </div>
              <div class="form-check form-check-reverse">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="expressShippingRadio"
                />
                <label class="form-check-label" for="expressShippingRadio">
                  Express (5-10 days)
                </label>
              </div>
              <div class="form-check form-check-reverse">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="premiumShippingRadio"
                />
                <label class="form-check-label" for="premiumShippingRadio">
                  Premium (1-3 days)
                </label>
              </div>
            </div>
          </div>
          <hr class="text-secondary">
          <!-- Fees + Taxes -->
          <div class="row">
            <div class="col text-start">
                Fees + Taxes
            </div>
            <div class="col text-end">
                $8.80 CAD
            </div>
          </div>
          <hr class="text-secondary">
          <!-- Total -->
          <div class="row">
            <div class="col text-start">
                Total
            </div>
            <div class="col text-end">
                $82.67 CAD
            </div>
          </div>
        </div>
        <!-- Checkout Button -->
           <button class="btn btn-secondary w-100 mt-3 text-start fw-bold p-3 text-light">
                Checkout
           </button>
      </div>
    </div>
  </body>
</html>
