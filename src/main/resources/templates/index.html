<!-- PRODUCTS LIST PAGE -->

<!DOCTYPE html>
<html lang="en">
  <html xmlns:th="http://www.thymeleaf.org"></html>
  <head>
    <meta charset="utf-8" />
    <title>Product List</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
  </head>
  <body>
     <nav class="navbar navbar-expand-lg sticky-top navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img th:src="@{/img/F2F-logo.svg}" width="64" height="64" alt="F2F">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarMain">
          
          <ul class="navbar-nav me-3">
            <li class="nav-item">
              <a class="nav-link active text-dark" href="#">Products</a>
            </li>
          </ul>
          
          <div class="d-flex gap-2">
            <a href="#" class="btn btn-outline-primary">Cart</a>
            <a href="#" class="btn btn-primary">Account</a>
          </div>
          
        </div>
      </div>
    </nav>
    
    <div class="container mt-5">
      <div class="row g-2">
        <div class="card w-100">
          <div class="card-body d-flex align-items-center justify-content-between">
            
            <div class="d-flex align-items-center">
              <div>
                <h5 class="card-title mb-0">Apples</h5>
                <p class="card-text mb-0">$5.00/5 lbs</p>
              </div>
            </div>

            <form action="" class="d-flex align-items-center">
              <div class="input-group me-3" style="width: 8rem;">
                <input type="button" value="-" class="btn btn-primary" data-field="quantity">
                <input type="text" value="1" name="quantity" class="form-control text-center border-primary" />
                <input type="button" value="+" class="btn btn-primary" data-field="quantity">
              </div>
              
              <button type="submit" class="btn btn-primary">Add to Cart</button>
            </form>
          </div>
        </div>

        <div class="card w-100">
          <div class="card-body d-flex align-items-center justify-content-between">
            
            <div class="d-flex align-items-center">
              <div>
                <h5 class="card-title mb-0">Milk</h5>
                <p class="card-text mb-0">$2.00/1 litre</p>
              </div>
            </div>

            <form action="" class="d-flex align-items-center">
              <div class="input-group me-3" style="width: 8rem;">
                <input type="button" value="-" class="btn btn-primary" data-field="quantity">
                <input type="text" value="1" name="quantity" class="form-control text-center border-primary" />
                <input type="button" value="+" class="btn btn-primary" data-field="quantity">
              </div>
              
              <button type="submit" class="btn btn-primary">Add to Cart</button>
            </form>
          </div>
        </div>

        <div class="card w-100">
          <div class="card-body d-flex align-items-center justify-content-between">
            
            <div class="d-flex align-items-center">
              <div>
                <h5 class="card-title mb-0">Bread</h5>
                <p class="card-text mb-0">$3.00/1 loaf</p>
              </div>
            </div>

            <form action="" class="d-flex align-items-center">
              <div class="input-group me-3" style="width: 8rem;">
                <input type="button" value="-" class="btn btn-primary" data-field="quantity">
                <input type="text" value="1" name="quantity" class="form-control text-center border-primary" />
                <input type="button" value="+" class="btn btn-primary" data-field="quantity">
              </div>
              
              <button type="submit" class="btn btn-primary">Add to Cart</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>

    <script>
      // JavaScript to handle quantity increment and decrement (for testing/fun. wil change to java maybe)
      document.querySelectorAll('input[type="button"]').forEach(button => {
        button.addEventListener('click', function() {
          const fieldName = this.getAttribute('data-field');
          const input = this.parentNode.querySelector(`input[name="${fieldName}"]`);
          let currentValue = parseInt(input.value);
          
          if (this.value === '+') {
            input.value = currentValue + 1;
          } else if (this.value === '-' && currentValue > 1) {
            input.value = currentValue - 1;
          }
        });
      });
    </script>
  </body>
</html>
